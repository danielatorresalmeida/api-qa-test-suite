name: Update API QA Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests and generate report
        run: |
          mkdir -p docs/assets/reports/api-qa
          pytest --html=docs/assets/reports/api-qa/index.html --self-contained-html

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/reports/api-qa/index.html
          git add docs/index.html docs/.nojekyll
          git diff --staged --quiet && exit 0
          git commit -m "Update API QA report"
          git push